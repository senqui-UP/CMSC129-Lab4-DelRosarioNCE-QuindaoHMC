services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: hopecore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production

  # ── Frontend (static site) ─────────────────────────────────────────────────
  - type: web
    name: hopecore-client
    runtime: static
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://hopecore-api.onrender.com