services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: hopecore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production

  # ── Frontend (static site) ─────────────────────────────────────────────────
- type: web
    name: hopecore-client
    runtime: static
    rootDir: client
    buildCommand: npm install --include=dev && VITE_API_URL=https://hopecore-api.onrender.com npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html