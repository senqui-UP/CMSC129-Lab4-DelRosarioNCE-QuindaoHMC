# render.yaml — Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: hopecore-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production

  # ── Frontend (static site) ─────────────────────────────────────────────────
  - type: web
    name: hopecore-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — send all paths to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://hopecore-api.onrender.com